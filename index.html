<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AtomOS Repo</title>
<style>
body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: Arial;
}
h1 {
    text-align: center;
}
table {
    width: 100%;
    border-collapse: collapse;
}
td, th {
    padding: 10px;
    border-bottom: 1px solid #30363d;
}
a {
    color: #58a6ff;
    text-decoration: none;
}
button {
    background: #238636;
    border: none;
    padding: 6px 10px;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}
button:hover {
    background: #2ea043;
}
</style>
</head>
<body>

<h1>AtomOS Package Repository</h1>

<table>
<thead>
<tr>
<th>Package</th>
<th>Version</th>
<th>Description</th>
<th>Download</th>
</tr>
</thead>
<tbody id="pkglist">
</tbody>
</table>

<script>
const repo = "https://raw.githubusercontent.com/AzuraYT1/Atomos-Repo/main";

fetch(repo + "/packages.list")
.then(r => r.text())
.then(text => {
    let lines = text.trim().split("\n");
    let table = document.getElementById("pkglist");

    lines.forEach(line => {
        let parts = line.split("|");
        let name = parts[0];
        let ver = parts[1];
        let desc = parts[2];

        let row = `
        <tr>
            <td>${name}</td>
            <td>${ver}</td>
            <td>${desc}</td>
            <td>
                <a href="${repo}/${name}.tar.gz">
                    <button>Download</button>
                </a>
            </td>
        </tr>
        `;

        table.innerHTML += row;
    });
});
</script>

</body>
</html>
